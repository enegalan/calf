minimumLimaVersion: 1.0.0

vmType: vz

vmOpts:
  vz:
    rosetta:
      enabled: true
      binfmt: true

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: x86_64
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: %[3]d
memory: %[4]dGiB
disk: %[6]dGiB

mounts:
  - location: "%[1]s/.config/calf/mounts"
    writable: true
    mountPoint: /mnt/calf

ssh:
  loadDotSSHPubKeys: true

hostResolver:
  hosts:
    host.docker.internal: host.lima.internal

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      apt-get update
      DEBIAN_FRONTEND=noninteractive apt-get install -y containerd docker.io curl ca-certificates socat
      systemctl enable --now containerd
      systemctl enable --now docker
      usermod -aG docker "{{.User}}"
      ARCH="$(uname -m)"
      case "$ARCH" in
        aarch64|arm64) NERD_ARCH=arm64 ;;
        x86_64|amd64) NERD_ARCH=amd64 ;;
        *) exit 1 ;;
      esac
      NERD_VERSION=1.7.6
      curl -fsSL "https://github.com/containerd/nerdctl/releases/download/v${NERD_VERSION}/nerdctl-${NERD_VERSION}-linux-${NERD_ARCH}.tar.gz" | tar Cxz /usr/local/bin
      ln -sf /usr/local/bin/nerdctl /usr/bin/nerdctl
      SWAP_GB=%[5]d
      if [ "${SWAP_GB}" -gt 0 ] 2>/dev/null && [ ! -f /swapfile ]; then
        fallocate -l "${SWAP_GB}G" /swapfile 2>/dev/null || dd if=/dev/zero of=/swapfile bs=1M count=$((SWAP_GB * 1024))
        chmod 600 /swapfile
        mkswap /swapfile
        swapon /swapfile
        grep -q '^/swapfile ' /etc/fstab || echo '/swapfile none swap sw 0 0' >> /etc/fstab
      fi
      nerdctl run --rm hello-world || true
      sudo mkdir -p /etc/systemd/system/containerd.service.d
      sudo tee /etc/systemd/system/containerd.service.d/calf-proxy.conf >/dev/null <<'EOF'
      [Service]
      Environment="HTTP_PROXY=%[7]s"
      Environment="HTTPS_PROXY=%[8]s"
      Environment="NO_PROXY=%[9]s"
      Environment="http_proxy=%[7]s"
      Environment="https_proxy=%[8]s"
      Environment="no_proxy=%[9]s"
      EOF
      sudo tee /etc/profile.d/calf-proxy.sh >/dev/null <<'EOF'
      export HTTP_PROXY=%[7]s
      export HTTPS_PROXY=%[8]s
      export NO_PROXY=%[9]s
      export http_proxy=%[7]s
      export https_proxy=%[8]s
      export no_proxy=%[9]s
      EOF
      sudo systemctl daemon-reload
      sudo systemctl restart containerd docker

      sudo tee /etc/systemd/system/docker-tcp-proxy.service >/dev/null <<'SERVICEEOF'
      [Unit]
      Description=Docker TCP Proxy
      After=docker.service
      Requires=docker.service
      [Service]
      Type=simple
      ExecStart=/usr/bin/socat TCP-LISTEN:2375,bind=127.0.0.1,reuseaddr,fork UNIX-CONNECT:/var/run/docker.sock
      Restart=always
      RestartSec=5
      [Install]
      WantedBy=multi-user.target
SERVICEEOF
      sudo systemctl enable docker-tcp-proxy
      sudo systemctl start docker-tcp-proxy

portForwards:
  - guestPort: 2375
    hostPort: 2375
