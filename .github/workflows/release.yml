name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'backend/version/version.go'
      - 'ui/pubspec.yaml'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: package-macos
            artifacts: |
              dist/Calf-*.dmg
              dist/Calf-*.pkg
          - os: windows-latest
            target: package-windows
            artifacts: |
              dist/Calf-*.exe
          - os: ubuntu-latest
            target: package-linux
            artifacts: |
              dist/calf_*.deb
              dist/calf-*.rpm
              dist/Calf-*.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y dpkg-dev rpm wget

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Build and package ${{ matrix.os }}
        run: make ${{ matrix.target }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calf-installers-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'const Version' backend/version/version.go | sed 's/.*"\(.*\)".*/\1/')
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: calf-installers-*
          merge-multiple: true

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Calf ${{ steps.version.outputs.version }}
          draft: true
          generate_release_notes: true
          files: dist/*
