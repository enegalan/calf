name: Release

on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'backend/version/version.go'
      - 'ui/pubspec.yaml'

permissions:
  contents: read

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-latest
            target: package-macos
            artifacts: |
              dist/Calf-*.dmg
              dist/Calf-*.pkg
          - os: windows-latest
            target: package-windows
            artifacts: |
              dist/Calf-*.exe
          - os: ubuntu-latest
            target: package-linux
            artifacts: |
              dist/calf_*.deb
              dist/calf-*.rpm
              dist/Calf-*.AppImage

    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - uses: actions/setup-go@v5
        with:
          go-version-file: backend/go.mod
          cache-dependency-path: backend/go.sum

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install Linux packaging tools
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libayatana-appindicator3-dev \
            dpkg-dev rpm wget

      - name: Install Inno Setup (Windows)
        if: matrix.os == 'windows-latest'
        run: choco install innosetup -y

      - name: Install create-dmg and krunkit deps (macOS)
        if: matrix.os == 'macos-latest'
        run: |
          brew tap libkrun/krun
          brew install create-dmg libkrun/krun/libkrun libkrun/krun/krunkit libkrun/krun/gvproxy
          curl --proto '=https' --tlsv1.2 -sSf https://sh.rustup.rs | sh -s -- -y
          source "$HOME/.cargo/env"
          make krunkit-stack

      - name: Build and package ${{ matrix.os }}
        run: make ${{ matrix.target }}

      - name: Upload installer artifacts
        uses: actions/upload-artifact@v4
        with:
          name: calf-installers-${{ matrix.os }}
          path: ${{ matrix.artifacts }}
          if-no-files-found: error

  release:
    needs: [build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep 'const Version' backend/version/version.go | sed 's/.*"\(.*\)".*/\1/')
          if [[ ! "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "error: invalid version format: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          pattern: calf-installers-*
          merge-multiple: true

      - name: Create GitHub release
        run: |
          # Guest disk (calf-guest-disk-*.raw.zst) is built on a real Mac with
          # `make guest-disk` and attached manually when needed — GHA nested VZ cannot bake it.
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "Calf ${{ steps.version.outputs.version }}" \
            --draft \
            --generate-notes \
            dist/*
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}