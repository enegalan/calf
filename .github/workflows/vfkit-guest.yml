name: VFKit guest disk

# Rebuild/upload the compressed vfkit guest without a full product release.
on:
  workflow_dispatch:
  push:
    branches:
      - main
    paths:
      - 'scripts/guest-image/**'
      - '.github/workflows/vfkit-guest.yml'

permissions:
  contents: read

jobs:
  build:
    runs-on: macos-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Install Lima and zstd
        run: brew install lima zstd

      - name: Build and pack vfkit guest disk
        run: make guest-vfkit

      - name: Upload vfkit guest disk assets
        uses: actions/upload-artifact@v4
        with:
          name: calf-vfkit-guest
          path: |
            dist/calf-vfkit-disk-*.raw.zst
            dist/calf-vfkit-efi-*.zst
          if-no-files-found: error
