# Lima template used only as a one-shot bake tool for the guest disk (not a Calf product runtime).
# Output disk is copied to ~/.config/calf/guest/<vm>/disk.raw by build-guest.sh.
minimumLimaVersion: 1.0.0

vmType: vz

images:
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-amd64.img"
    arch: x86_64
  - location: "https://cloud-images.ubuntu.com/releases/24.04/release/ubuntu-24.04-server-cloudimg-arm64.img"
    arch: aarch64

cpus: 4
memory: 4GiB
disk: 20GiB

mounts: []

ssh:
  loadDotSSHPubKeys: false

provision:
  - mode: system
    script: |
      #!/bin/bash
      set -eux -o pipefail
      export DEBIAN_FRONTEND=noninteractive

      apt-get update
      apt-get install -y containerd docker.io docker-buildx curl ca-certificates socat systemd-resolved dnsmasq

      systemctl enable --now containerd
      systemctl enable --now docker
      usermod -aG docker "{{.User}}" || true

      mkdir -p /etc/docker
      printf '%s\n' '{"features":{"buildkit":true},"dns":["172.17.0.1","1.1.1.1","8.8.8.8"]}' > /etc/docker/daemon.json

      mkdir -p /etc/systemd/resolved.conf.d
      printf '%s\n' '[Resolve]' 'DNS=1.1.1.1 8.8.8.8' 'FallbackDNS=9.9.9.9' > /etc/systemd/resolved.conf.d/calf-dns.conf
      systemctl enable --now systemd-resolved || true
      ln -sf /run/systemd/resolve/stub-resolv.conf /etc/resolv.conf || true

      mkdir -p /etc/systemd/network
      # Whitespace-separated globs are OR'd; two Name= lines would be AND and never match.
      # Static .2 matches gvproxy's default VM address used for host port forwards.
      printf '%s\n' \
        '[Match]' \
        'Name=enp* eth*' \
        '' \
        '[Network]' \
        'Address=192.168.127.2/24' \
        'Gateway=192.168.127.1' \
        'DNS=192.168.127.1' \
        > /etc/systemd/network/20-calf-eth.network
      systemctl enable systemd-networkd
      systemctl restart systemd-networkd || true

      # host.docker.internal → NAT gateway (Mac host). Runtime refreshes the gateway IP on Start.
      GW=$(ip -4 route show default | awk '{print $3; exit}' || true)
      if [ -n "${GW:-}" ]; then
        echo "$GW host.docker.internal" >> /etc/hosts
      fi
      mkdir -p /etc/dnsmasq.d
      printf '%s\n' \
        'bind-interfaces' \
        'interface=docker0' \
        'except-interface=lo' \
        "address=/host.docker.internal/${GW:-127.0.0.1}" \
        'no-resolv' \
        'server=1.1.1.1' \
        'server=8.8.8.8' \
        > /etc/dnsmasq.d/calf-host.conf
      systemctl enable dnsmasq
      # docker0 exists after docker start; restart dnsmasq once docker is up
      systemctl restart docker
      systemctl restart dnsmasq || true

      printf '%s\n' \
        '[Unit]' \
        'Description=Docker vsock proxy for Calf guest' \
        'After=docker.service' \
        'Requires=docker.service' \
        '' \
        '[Service]' \
        'Type=simple' \
        'ExecStart=/usr/bin/socat VSOCK-LISTEN:2375,reuseaddr,fork UNIX-CONNECT:/var/run/docker.sock' \
        'Restart=always' \
        'RestartSec=1' \
        '' \
        '[Install]' \
        'WantedBy=multi-user.target' \
        > /etc/systemd/system/docker-vsock-proxy.service
      systemctl enable --now docker-vsock-proxy

      mkdir -p /mnt/calf
      printf '%s\n' \
        '[Unit]' \
        'Description=Mount Calf virtiofs shares' \
        'DefaultDependencies=no' \
        'After=local-fs.target' \
        'Before=docker.service' \
        '' \
        '[Service]' \
        'Type=oneshot' \
        'RemainAfterExit=yes' \
        'ExecStart=/bin/mkdir -p /mnt/calf' \
        'ExecStart=/bin/sh -c "mount -t virtiofs -o dax=always,noatime calf-mounts /mnt/calf 2>/dev/null || mount -t virtiofs -o noatime calf-mounts /mnt/calf"' \
        'ExecStop=/bin/umount -l /mnt/calf' \
        '' \
        '[Install]' \
        'WantedBy=multi-user.target' \
        > /etc/systemd/system/calf-virtiofs.service
      systemctl enable calf-virtiofs.service

      systemctl restart docker
      docker pull alpine:3.20
      docker pull hello-world
