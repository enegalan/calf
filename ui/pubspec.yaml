publish_to: 'none'
version: 0.9.8+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  http: ^1.6.0
  lucide_icons_flutter: ^3.1.15
  web_socket_channel: ^3.0.3
  xterm: ^4.0.0
  fl_chart: ^0.70.2
